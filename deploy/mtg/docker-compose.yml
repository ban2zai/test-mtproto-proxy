version: "3.8"

services:
  mtg:
    image: ghcr.io/9seconds/mtg:2
    container_name: tools-mtg-1
    restart: unless-stopped
    command: >
      run
      0.0.0.0:3128
      ${MTG_SECRET}
    ports:
      # Снаружи доступен только с localhost; внутри tools_default — по имени контейнера
      - "127.0.0.1:3128:3128"
    networks:
      - tools_default

networks:
  tools_default:
    external: true
